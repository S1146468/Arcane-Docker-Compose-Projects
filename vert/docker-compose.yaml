services:
  vert:
    container_name: vert
    image: ghcr.io/vert-sh/vert:latest
    restart: unless-stopped

    ports:
      - target: 80
        published: "${VERT_HOST_PORT:-5173}"
        host_ip: "${VERT_BIND_IP:-10.12.144.3}"
        protocol: tcp

    environment:
      TZ: "${TZ:-Europe/Amsterdam}"

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - NET_RAW

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    mem_limit: 512m
    pids_limit: 128