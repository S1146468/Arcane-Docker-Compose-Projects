services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: always
    environment:
      DOMAIN: "https://vaultwarden.ter-heerdt.xyz"  # required when using a reverse proxy; your domain; vaultwarden needs to know it's https to work properly with attachments
      SIGNUPS_ALLOWED: "true" # Deactivate this with "false" after you have created your account so that no strangers can register
    volumes:
    - type: volume
      source: vaultwarden-volume
      target: /data
    ports:
      - 11001:80 # you can replace the 11001 with your preferred port

volumes:
  vaultwarden-volume: