networks:
  openproject-frontend:
  openproject-backend:

volumes:
  openproject-pgdata:
  openproject-opdata:

x-op-restart-policy: &restart_policy
  restart: unless-stopped

x-op-image: &op_image
  image: openproject/openproject:${OPENPROJECT_TAG:-17-slim}

x-op-app: &op_app
  <<: [*op_image, *restart_policy]
  environment:
    OPENPROJECT_HTTPS: "${OPENPROJECT_HTTPS:-false}"
    OPENPROJECT_HOST__NAME: "${OPENPROJECT_HOST__NAME:-localhost}"
    OPENPROJECT_ADDITIONAL__HOST__NAMES: "web"
    OPENPROJECT_HSTS: "${OPENPROJECT_HSTS:-false}"
    OPENPROJECT_RAILS__CACHE__STORE: "memcache"
    OPENPROJECT_CACHE__MEMCACHE__SERVER: "cache:11211"
    OPENPROJECT_RAILS__RELATIVE__URL__ROOT: "${OPENPROJECT_RAILS__RELATIVE__URL__ROOT:-}"
    OPENPROJECT_COLLABORATIVE__EDITING__HOCUSPOCUS__URL: "${COLLABORATIVE_SERVER_URL:-ws://localhost:8080/hocuspocus}"
    OPENPROJECT_COLLABORATIVE__EDITING__HOCUSPOCUS__SECRET: "${COLLABORATIVE_SERVER_SECRET}"
    DATABASE_URL: "${DATABASE_URL}"
    RAILS_MIN_THREADS: "${RAILS_MIN_THREADS:-4}"
    RAILS_MAX_THREADS: "${RAILS_MAX_THREADS:-16}"
    IMAP_ENABLED: "${IMAP_ENABLED:-false}"
    SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
  volumes:
    - openproject-opdata:/var/openproject/assets

services:
  db:
    image: postgres:${POSTGRES_VERSION:-17}
    <<: *restart_policy
    stop_grace_period: 10s
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: openproject
    volumes:
      - openproject-pgdata:/var/lib/postgresql/data
    networks:
      - openproject-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openproject"]
      interval: 10s
      timeout: 5s
      retries: 10

  cache:
    image: memcached:1.6-alpine
    <<: *restart_policy
    networks:
      - openproject-backend

  web:
    <<: *op_app
    command: "./docker/prod/web"
    hostname: web
    ports:
      - "${PORT:-127.0.0.1:8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
      seeder:
        condition: service_completed_successfully
    networks:
      - openproject-frontend
      - openproject-backend

  worker:
    <<: *op_app
    command: "./docker/prod/worker"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
      seeder:
        condition: service_completed_successfully
    networks:
      - openproject-backend

  cron:
    <<: *op_app
    command: "./docker/prod/cron"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
      seeder:
        condition: service_completed_successfully
    networks:
      - openproject-backend

  seeder: 
    <<: *op_app
    command: "./docker/prod/seeder"
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
      - openproject-backend

  hocuspocus:
    image: openproject/hocuspocus:${HOCUSPOCUS_TAG:-17.4.0}
    <<: *restart_policy
    environment:
      SECRET: "${COLLABORATIVE_SERVER_SECRET}"
      OPENPROJECT_URL: "http://web:8080"
      OPENPROJECT_HTTPS: "${OPENPROJECT_HTTPS:-false}"
    depends_on:
      web:
        condition: service_healthy
    networks:
      - openproject-backend
      - openproject-frontend